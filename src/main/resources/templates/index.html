<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head('Home')}"></head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow-1">

    <!-- Hero -->
    <div class="hero-banner text-white text-center py-5 mb-5">
        <div class="container">
            <h1 class="display-4 fw-bold mb-3">&#x26BD; Tutti i tornei di Calcio!</h1>
            <p class="lead mb-4">Segui i tuoi tornei preferiti, consulta la classifica e commenta le partite.</p>
            <a th:href="@{/tornei}" class="btn btn-light btn-lg fw-semibold me-2">
                <i class="bi bi-trophy"></i> Vedi i Tornei
            </a>
            <a th:href="@{/squadre}" class="btn btn-outline-light btn-lg">
                <i class="bi bi-people"></i> Le Squadre
            </a>
        </div>
    </div>

    <div class="container">
        <div th:replace="~{fragments/layout :: alerts}"></div>

        <!-- Tornei in evidenza -->
        <h2 class="section-title mb-4"><i class="bi bi-trophy-fill text-success"></i> Tornei Attivi</h2>

        <div th:if="${tornei.empty}" class="text-center text-muted py-5">
            <i class="bi bi-calendar-x display-1"></i>
            <p class="mt-3">Nessun torneo disponibile al momento.</p>
            <a th:href="@{/tornei/nuovo}" sec:authorize="hasRole('ADMIN')"
               class="btn btn-success mt-2">
                <i class="bi bi-plus-circle"></i> Crea il primo torneo
            </a>
        </div>

        <div class="row g-4" th:unless="${tornei.empty}">
            <div class="col-md-6 col-lg-4" th:each="torneo : ${tornei}">
                <div class="card h-100 shadow-sm torneo-card">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <span class="fw-semibold" th:text="${torneo.nome}">Nome</span>
                        <span class="badge bg-light text-success" th:text="${torneo.anno}">2024</span>
                    </div>
                    <div class="card-body">
                        <p class="card-text text-muted small"
                           th:text="${torneo.descrizione != null ? torneo.descrizione : 'Nessuna descrizione disponibile.'}">
                        </p>
                        <div class="d-flex align-items-center text-muted small mt-2">
                            <i class="bi bi-people me-1"></i>
                            <span th:text="${torneo.squadre.size()} + ' squadre iscritte'"></span>
                        </div>
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex gap-2">
                        <a th:href="@{/tornei/{id}(id=${torneo.id})}"
                           class="btn btn-outline-success btn-sm flex-grow-1">
                            <i class="bi bi-eye"></i> Dettaglio
                        </a>
                        <a th:href="@{/classifica/torneo/{id}(id=${torneo.id})}"
                           class="btn btn-success btn-sm flex-grow-1">
                            <i class="bi bi-list-ol"></i> Classifica
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
