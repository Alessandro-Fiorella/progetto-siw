<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head('Squadra')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow-1 container my-4">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/squadre}">Squadre</a></li>
            <li class="breadcrumb-item active" th:text="${squadra.nome}"></li>
        </ol>
    </nav>

    <!-- Intestazione squadra -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
        <div class="d-flex align-items-center gap-3">
            <i class="bi bi-shield-fill text-success display-4"></i>
            <div>
                <h1 class="fw-bold mb-0" th:text="${squadra.nome}"></h1>
                <div class="text-muted">
                    <i class="bi bi-geo-alt"></i>
                    <span th:text="${squadra.citta != null ? squadra.citta : 'Citta non specificata'}"></span>
                    &nbsp;|&nbsp;
                    <i class="bi bi-calendar"></i>
                    <span th:text="'Fondata nel ' + (${squadra.annoFondazione != null ? squadra.annoFondazione : 'N/D'})"></span>
                </div>
            </div>
        </div>
        <div sec:authorize="hasRole('ADMIN')" class="d-flex gap-2">
            <a th:href="@{/giocatori/nuovo(squadraId=${squadra.id})}" class="btn btn-success">
                <i class="bi bi-person-plus"></i> Aggiungi Giocatore
            </a>
            <a th:href="@{/squadre/{id}/modifica(id=${squadra.id})}" class="btn btn-warning">
                <i class="bi bi-pencil"></i> Modifica
            </a>
        </div>
    </div>

    <!-- Rosa giocatori -->
    <h4 class="section-title mb-3">
        <i class="bi bi-person-lines-fill text-success"></i> Rosa
        <span class="badge bg-success ms-2" th:text="${squadra.giocatori.size()}"></span>
    </h4>

    <div th:if="${squadra.giocatori.empty}" class="text-muted fst-italic mb-4">
        Nessun giocatore nella rosa.
    </div>

    <div class="table-responsive" th:unless="${squadra.giocatori.empty}">
        <table class="table table-hover align-middle">
            <thead class="table-success">
                <tr>
                    <th>Giocatore</th>
                    <th>Ruolo</th>
                    <th>Data di Nascita</th>
                    <th>Altezza</th>
                    <th sec:authorize="hasRole('ADMIN')">Azioni</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="g : ${squadra.giocatori}">
                    <td>
                        <i class="bi bi-person-circle text-success me-2"></i>
                        <strong th:text="${g.cognome + ' ' + g.nome}"></strong>
                    </td>
                    <td>
                        <span class="badge bg-secondary" th:text="${g.ruolo != null ? g.ruolo : 'N/D'}"></span>
                    </td>
                    <td>
                        <span th:text="${g.dataNascita != null ? #temporals.format(g.dataNascita,'dd/MM/yyyy') : 'N/D'}"></span>
                    </td>
                    <td>
                        <span th:text="${g.altezza != null ? g.altezza + ' cm' : 'N/D'}"></span>
                    </td>
                    <td sec:authorize="hasRole('ADMIN')">
                        <div class="d-flex gap-1">
                            <a th:href="@{/giocatori/{id}/modifica(id=${g.id})}"
                               class="btn btn-warning btn-sm">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <form th:action="@{/giocatori/{id}/elimina(id=${g.id})}"
                                  method="post"
                                  onsubmit="return confirm('Eliminare questo giocatore?')">
                                <input type="hidden" name="squadraId" th:value="${squadra.id}"/>
                                <button type="submit" class="btn btn-danger btn-sm">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- Tornei a cui partecipa -->
    <h4 class="section-title mt-4 mb-3">
        <i class="bi bi-trophy-fill text-success"></i> Tornei
    </h4>
    <div th:if="${squadra.tornei.empty}" class="text-muted fst-italic">
        Non iscritta a nessun torneo.
    </div>
    <div class="d-flex flex-wrap gap-2" th:unless="${squadra.tornei.empty}">
        <a th:each="t : ${squadra.tornei}"
           th:href="@{/tornei/{id}(id=${t.id})}"
           class="btn btn-outline-success btn-sm">
            <i class="bi bi-trophy"></i>
            <span th:text="${t.nome + ' ' + t.anno}"></span>
        </a>
    </div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
