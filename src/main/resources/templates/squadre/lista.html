<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head('Squadre')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow-1 container my-4">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title"><i class="bi bi-people-fill text-success"></i> Squadre</h1>
        <a th:href="@{/squadre/nuova}" sec:authorize="hasRole('ADMIN')" class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Nuova Squadra
        </a>
    </div>

    <div th:if="${squadre.empty}" class="text-center text-muted py-5">
        <i class="bi bi-people display-1"></i>
        <p class="mt-3 fs-5">Nessuna squadra presente.</p>
    </div>

    <div class="row g-3" th:unless="${squadre.empty}">
        <div class="col-sm-6 col-md-4 col-lg-3" th:each="squadra : ${squadre}">
            <div class="card h-100 shadow-sm text-center squadra-card">
                <div class="card-body py-4">
                    <i class="bi bi-shield-fill text-success display-5 mb-3"></i>
                    <h5 class="fw-bold mb-1" th:text="${squadra.nome}"></h5>
                    <p class="text-muted small mb-1">
                        <i class="bi bi-geo-alt"></i>
                        <span th:text="${squadra.citta != null ? squadra.citta : 'N/D'}"></span>
                    </p>
                    <p class="text-muted small">
                        <i class="bi bi-calendar"></i>
                        <span th:text="'Fondata: ' + (${squadra.annoFondazione != null ? squadra.annoFondazione : 'N/D'})"></span>
                    </p>
                </div>
                <div class="card-footer bg-white border-0 d-flex gap-1 justify-content-center pb-3">
                    <a th:href="@{/squadre/{id}(id=${squadra.id})}"
                       class="btn btn-outline-success btn-sm">
                        <i class="bi bi-eye"></i> Dettaglio
                    </a>
                    <a th:href="@{/squadre/{id}/modifica(id=${squadra.id})}"
                       sec:authorize="hasRole('ADMIN')"
                       class="btn btn-warning btn-sm">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <form th:action="@{/squadre/{id}/elimina(id=${squadra.id})}"
                          method="post" sec:authorize="hasRole('ADMIN')"
                          onsubmit="return confirm('Eliminare la squadra e tutti i suoi giocatori?')">
                        <button type="submit" class="btn btn-danger btn-sm">
                            <i class="bi bi-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
