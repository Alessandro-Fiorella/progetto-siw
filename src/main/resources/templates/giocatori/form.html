<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Giocatore')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow-1 container my-4" style="max-width:600px">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/squadre}">Squadre</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/squadre/{id}(id=${squadra.id})}"
                   th:text="${squadra.nome}"></a>
            </li>
            <li class="breadcrumb-item active"
                th:text="${giocatore.id != null ? 'Modifica Giocatore' : 'Nuovo Giocatore'}"></li>
        </ol>
    </nav>

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0"
                th:text="${giocatore.id != null ? 'Modifica Giocatore' : 'Aggiungi Giocatore'}">
            </h5>
        </div>
        <div class="card-body">
            <form th:action="${giocatore.id != null ?
                              '/giocatori/' + giocatore.id + '/modifica' :
                              '/giocatori/nuovo'}"
                  th:object="${giocatore}" method="post">

                <!-- squadraId passato come hidden (per redirect e assegnazione) -->
                <input type="hidden" name="squadraId" th:value="${squadra.id}"/>

                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Nome *</label>
                        <input type="text" class="form-control" th:field="*{nome}"
                               placeholder="es. Marco" required/>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Cognome *</label>
                        <input type="text" class="form-control" th:field="*{cognome}"
                               placeholder="es. Rossi" required/>
                    </div>
                </div>

                <div class="row g-3 mt-1">
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Data di Nascita</label>
                        <input type="date" class="form-control" th:field="*{dataNascita}"/>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Altezza (cm)</label>
                        <input type="number" class="form-control" th:field="*{altezza}"
                               min="100" max="250" placeholder="es. 180"/>
                    </div>
                </div>

                <div class="mt-3 mb-4">
                    <label class="form-label fw-semibold">Ruolo</label>
                    <select class="form-select" th:field="*{ruolo}">
                        <option value="">-- Seleziona ruolo --</option>
                        <option value="Portiere">Portiere</option>
                        <option value="Difensore">Difensore</option>
                        <option value="Centrocampista">Centrocampista</option>
                        <option value="Attaccante">Attaccante</option>
                    </select>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/squadre/{id}(id=${squadra.id})}"
                       class="btn btn-secondary">Annulla</a>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-lg"></i>
                        <span th:text="${giocatore.id != null ?
                              'Salva Modifiche' : 'Aggiungi Giocatore'}"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
