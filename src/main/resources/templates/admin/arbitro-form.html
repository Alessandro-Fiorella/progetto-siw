<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Arbitro')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow-1 container my-4" style="max-width:560px">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/admin}">Admin</a></li>
            <li class="breadcrumb-item active"
                th:text="${arbitro.id != null ? 'Modifica Arbitro' : 'Nuovo Arbitro'}"></li>
        </ol>
    </nav>

    <div class="card shadow-sm">
        <div class="card-header bg-warning">
            <h5 class="mb-0 fw-bold"
                th:text="${arbitro.id != null ? 'Modifica Arbitro' : 'Aggiungi Arbitro'}"></h5>
        </div>
        <div class="card-body">
            <form th:action="${arbitro.id != null ?
                              '/admin/arbitri/' + arbitro.id + '/modifica' :
                              '/admin/arbitri/nuovo'}"
                  th:object="${arbitro}" method="post">

                <div class="row g-3">
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Nome *</label>
                        <input type="text" class="form-control" th:field="*{nome}"
                               placeholder="es. Luigi" required/>
                    </div>
                    <div class="col-sm-6">
                        <label class="form-label fw-semibold">Cognome *</label>
                        <input type="text" class="form-control" th:field="*{cognome}"
                               placeholder="es. Bianchi" required/>
                    </div>
                </div>

                <div class="mt-3 mb-4">
                    <label class="form-label fw-semibold">Codice Arbitrale *</label>
                    <input type="text" class="form-control" th:field="*{codiceArbitrale}"
                           placeholder="es. ARB-001" required/>
                    <div class="form-text">
                        Il codice deve essere univoco nel sistema.
                    </div>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/admin}" class="btn btn-secondary">Annulla</a>
                    <button type="submit" class="btn btn-warning fw-semibold">
                        <i class="bi bi-check-lg"></i>
                        <span th:text="${arbitro.id != null ?
                              'Salva Modifiche' : 'Aggiungi Arbitro'}"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
