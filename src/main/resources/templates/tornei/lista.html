<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head('Tornei')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow-1 container my-4">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="section-title"><i class="bi bi-trophy-fill text-success"></i> Tutti i Tornei</h1>
        <a th:href="@{/tornei/nuovo}" sec:authorize="hasRole('ADMIN')"
           class="btn btn-success">
            <i class="bi bi-plus-circle"></i> Nuovo Torneo
        </a>
    </div>

    <div th:if="${tornei.empty}" class="text-center text-muted py-5">
        <i class="bi bi-trophy display-1"></i>
        <p class="mt-3 fs-5">Nessun torneo presente.</p>
    </div>

    <div class="row g-4" th:unless="${tornei.empty}">
        <div class="col-md-6 col-lg-4" th:each="torneo : ${tornei}">
            <div class="card h-100 shadow-sm torneo-card">
                <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                    <span class="fw-semibold" th:text="${torneo.nome}"></span>
                    <span class="badge bg-light text-success" th:text="${torneo.anno}"></span>
                </div>
                <div class="card-body">
                    <p class="card-text text-muted small"
                       th:text="${torneo.descrizione != null ? torneo.descrizione : 'Nessuna descrizione.'}"></p>
                    <p class="text-muted small mb-0">
                        <i class="bi bi-people"></i>
                        <span th:text="${torneo.squadre.size()} + ' squadre'"></span>
                    </p>
                </div>
                <div class="card-footer bg-white border-0 d-flex gap-2 flex-wrap">
                    <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="btn btn-outline-success btn-sm">
                        <i class="bi bi-eye"></i> Dettaglio
                    </a>
                    <a th:href="@{/partite/torneo/{id}(id=${torneo.id})}" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-calendar3"></i> Calendario
                    </a>
                    <a th:href="@{/classifica/torneo/{id}(id=${torneo.id})}" class="btn btn-success btn-sm">
                        <i class="bi bi-list-ol"></i> Classifica
                    </a>
                    <a th:href="@{/tornei/{id}/modifica(id=${torneo.id})}"
                       sec:authorize="hasRole('ADMIN')"
                       class="btn btn-warning btn-sm ms-auto">
                        <i class="bi bi-pencil"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
