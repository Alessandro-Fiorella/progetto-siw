<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Aggiungi Squadra')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow-1 container my-4" style="max-width:600px">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/tornei}">Tornei</a></li>
            <li class="breadcrumb-item">
                <a th:href="@{/tornei/{id}(id=${torneo.id})}" th:text="${torneo.nome}"></a>
            </li>
            <li class="breadcrumb-item active">Aggiungi Squadra</li>
        </ol>
    </nav>

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">Aggiungi Squadra a <span th:text="${torneo.nome}"></span></h5>
        </div>
        <div class="card-body">
            <div th:if="${squadreDisponibili.empty}" class="text-muted fst-italic text-center py-3">
                Tutte le squadre sono gia iscritte a questo torneo.
            </div>

            <div th:unless="${squadreDisponibili.empty}">
                <p class="text-muted small mb-3">Seleziona una squadra da aggiungere al torneo.</p>
                <div class="list-group">
                    <div class="list-group-item d-flex justify-content-between align-items-center"
                         th:each="squadra : ${squadreDisponibili}">
                        <div>
                            <i class="bi bi-shield-fill text-success me-2"></i>
                            <strong th:text="${squadra.nome}"></strong>
                            <span class="text-muted ms-2 small" th:text="${squadra.citta}"></span>
                        </div>
                        <form th:action="@{/tornei/{tId}/squadre/{sId}/aggiungi(tId=${torneo.id},sId=${squadra.id})}"
                              method="post">
                            <button type="submit" class="btn btn-success btn-sm">
                                <i class="bi bi-plus"></i> Aggiungi
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        <div class="card-footer text-end">
            <a th:href="@{/tornei/{id}(id=${torneo.id})}" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i> Torna al Torneo
            </a>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
