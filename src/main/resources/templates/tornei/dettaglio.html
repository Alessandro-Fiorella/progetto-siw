<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/springsecurity6">
<head th:replace="~{fragments/layout :: head('Dettaglio Torneo')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow-1 container my-4">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <!-- Breadcrumb -->
    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/tornei}">Tornei</a></li>
            <li class="breadcrumb-item active" th:text="${torneo.nome}"></li>
        </ol>
    </nav>

    <!-- Intestazione torneo -->
    <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-2">
        <div>
            <h1 class="fw-bold mb-1" th:text="${torneo.nome}"></h1>
            <span class="badge bg-success fs-6" th:text="'Anno ' + ${torneo.anno}"></span>
        </div>
        <div class="d-flex gap-2 flex-wrap" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/tornei/{id}/modifica(id=${torneo.id})}" class="btn btn-warning">
                <i class="bi bi-pencil"></i> Modifica
            </a>
            <a th:href="@{/tornei/{id}/squadre/aggiungi(id=${torneo.id})}" class="btn btn-success">
                <i class="bi bi-person-plus"></i> Aggiungi Squadra
            </a>
            <a th:href="@{/partite/nuova(torneoId=${torneo.id})}" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i> Nuova Partita
            </a>
        </div>
    </div>

    <!-- Descrizione -->
    <div class="card mb-4" th:if="${torneo.descrizione != null and !torneo.descrizione.blank}">
        <div class="card-body text-muted" th:text="${torneo.descrizione}"></div>
    </div>

    <!-- Link rapidi -->
    <div class="d-flex gap-3 mb-4 flex-wrap">
        <a th:href="@{/partite/torneo/{id}(id=${torneo.id})}" class="btn btn-outline-secondary">
            <i class="bi bi-calendar3"></i> Calendario Partite
        </a>
        <a th:href="@{/classifica/torneo/{id}(id=${torneo.id})}" class="btn btn-outline-success">
            <i class="bi bi-list-ol"></i> Classifica
        </a>
    </div>

    <!-- Squadre partecipanti -->
    <h4 class="section-title mb-3">
        <i class="bi bi-people-fill text-success"></i> Squadre Partecipanti
        <span class="badge bg-success ms-2" th:text="${torneo.squadre.size()}"></span>
    </h4>

    <div th:if="${torneo.squadre.empty}" class="text-muted fst-italic mb-4">
        Nessuna squadra iscritta a questo torneo.
    </div>

    <div class="row g-3 mb-4" th:unless="${torneo.squadre.empty}">
        <div class="col-sm-6 col-md-4 col-lg-3" th:each="squadra : ${torneo.squadre}">
            <div class="card h-100 shadow-sm text-center py-3 squadra-card">
                <div class="card-body">
                    <i class="bi bi-shield-fill text-success display-6 mb-2"></i>
                    <h6 class="fw-bold mb-1" th:text="${squadra.nome}"></h6>
                    <small class="text-muted" th:text="${squadra.citta}"></small>
                </div>
                <div class="card-footer bg-white border-0 d-flex gap-2 justify-content-center">
                    <a th:href="@{/squadre/{id}(id=${squadra.id})}"
                       class="btn btn-outline-success btn-sm">
                        <i class="bi bi-eye"></i> Vedi
                    </a>
                    <form th:action="@{/tornei/{tId}/squadre/{sId}/rimuovi(tId=${torneo.id},sId=${squadra.id})}"
                          method="post" sec:authorize="hasRole('ADMIN')"
                          onsubmit="return confirm('Rimuovere la squadra dal torneo?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            <i class="bi bi-x"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
