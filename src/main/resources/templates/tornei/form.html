<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Torneo')}"></head>
<body class="d-flex flex-column min-vh-100">
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<main class="flex-grow-1 container my-4" style="max-width:600px">

    <div th:replace="~{fragments/layout :: alerts}"></div>

    <nav aria-label="breadcrumb" class="mb-3">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a th:href="@{/tornei}">Tornei</a></li>
            <li class="breadcrumb-item active"
                th:text="${torneo.id != null ? 'Modifica' : 'Nuovo Torneo'}"></li>
        </ol>
    </nav>

    <div class="card shadow-sm">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0"
                th:text="${torneo.id != null ? 'Modifica Torneo' : 'Crea Nuovo Torneo'}"></h5>
        </div>
        <div class="card-body">
            <form th:action="${torneo.id != null ?
                              '/tornei/' + torneo.id + '/modifica' :
                              '/tornei/nuovo'}"
                  th:object="${torneo}" method="post">

                <div class="mb-3">
                    <label class="form-label fw-semibold">Nome Torneo *</label>
                    <input type="text" class="form-control" th:field="*{nome}"
                           placeholder="es. Torneo Primavera 2025" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Anno *</label>
                    <input type="number" class="form-control" th:field="*{anno}"
                           min="1900" max="2100" placeholder="es. 2025" required/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-semibold">Descrizione</label>
                    <textarea class="form-control" th:field="*{descrizione}"
                              rows="4" placeholder="Descrizione opzionale del torneo"></textarea>
                </div>

                <div class="d-flex gap-2 justify-content-end">
                    <a th:href="@{/tornei}" class="btn btn-secondary">Annulla</a>
                    <button type="submit" class="btn btn-success">
                        <i class="bi bi-check-lg"></i>
                        <span th:text="${torneo.id != null ? 'Salva Modifiche' : 'Crea Torneo'}"></span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
<footer th:replace="~{fragments/layout :: footer}"></footer>
<th:block th:replace="~{fragments/layout :: scripts}"></th:block>
</body>
</html>
